# Standard Kubernetes Ingress resources (visible in Rancher Desktop UI)
# These will work with Traefik ingress controller
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: heart-api-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: heart-disease-api-service
                port:
                  number: 80

---
apiVersion: networking.k8s.io/v1

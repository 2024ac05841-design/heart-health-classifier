# Loki Stack for Log Aggregation
# Deploy with: kubectl apply -f k8s/loki-stack.yaml
---
# Loki Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels:
    app: loki
    environment: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:latest
        ports:
        - containerPort: 3100
          name: http
          protocol: TCP
        args:
          - -config.file=/etc/loki/local-config.yaml
        volumeMounts:
        - name: loki-storage
          mountPath: /loki
        - name: loki-config
          mountPath: /etc/loki
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: loki-storage
        emptyDir: {}
      - name: loki-config
        configMap:
          name: loki-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    app: loki
    environment: local
spec:
  type: ClusterIP
  selector:
    app: loki
  ports:
  - port: 3100
    targetPort: 3100
    protocol: TCP
    name: http
---
# Promtail Service (for Prometheus scraping)
apiVersion: v1
kind: Service
metadata:
  name: promtail
  labels:
    app: promtail
    environment: local
spec:
  type: ClusterIP
  selector:
    app: promtail
  ports:
  - port: 9080
    targetPort: 9080
    protocol: TCP
    name: http-metrics
---
# Promtail DaemonSet (collects logs from all pods)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  labels:
    app: promtail
    environment: local
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
      - name: promtail
        image: grafana/promtail:latest
        args:
          - -config.file=/etc/promtail/promtail.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: run
          mountPath: /run/promtail
        - name: containers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: pods
          mountPath: /var/log/pods
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: run
        hostPath:
          path: /run/promtail
      - name: containers
        hostPath:
          path: /var/lib/docker/containers
      - name: pods
        hostPath:
          path: /var/log/pods
---
# Service Account for Promtail
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
---
# ClusterRole for Promtail
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "watch", "list"]
---
# ClusterRoleBinding for Promtail
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: default
---
# Loki Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels:
    app: loki
data:
  local-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    limits_config:
      allow_structured_metadata: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      max_entries_limit_per_query: 10000
      max_query_length: 721h
      query_timeout: 1m

    ruler:
      alertmanager_url: http://localhost:9093
---
# Promtail Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: info

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: all-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/default_*/*/*.log
        pipeline_stages:
          # Extract log content from JSON
          - json:
              expressions:
                log: log
                stream: stream
          
          # Extract pod name from file path
          - regex:
              expression: '^/var/log/pods/default_(?P<pod_name>[^_]+).*'
              source: filename
          - labels:
              pod_name:
          
          # Extract log level for Heart API (Python FastAPI format: "INFO: ...")
          - match:
              selector: '{pod_name=~"heart-disease-api.*"}'
              stages:
                - regex:
                    expression: '^(?P<level>DEBUG|INFO|WARNING|ERROR|CRITICAL):'
                    source: log
                - labels:
                    level:
          
          # Extract log level for Loki (level=info format)
          - match:
              selector: '{pod_name=~"loki.*"}'
              stages:
                - regex:
                    expression: 'level=(?P<level>debug|info|warn|warning|error|critical)'
                    source: log
                - template:
                    source: level
                    template: '{{ ToUpper .Value }}'
                - labels:
                    level:
          
          # Extract log level for Prometheus (level=info format)
          - match:
              selector: '{pod_name=~"prometheus.*"}'
              stages:
                - regex:
                    expression: 'level=(?P<level>DEBUG|INFO|WARN|WARNING|ERROR|CRITICAL|debug|info|warn|warning|error|critical)'
                    source: log
                - template:
                    source: level
                    template: '{{ ToUpper .Value }}'
                - labels:
                    level:
          
          # Extract log level for Promtail (level=info format)
          - match:
              selector: '{pod_name=~"promtail.*"}'
              stages:
                - regex:
                    expression: 'level=(?P<level>debug|info|warn|warning|error|critical)'
                    source: log
                - template:
                    source: level
                    template: '{{ ToUpper .Value }}'
                - labels:
                    level:
          
          # Extract log level for Grafana (various formats)
          - match:
              selector: '{pod_name=~"grafana.*"}'
              stages:
                - regex:
                    expression: 'level=(?P<level>debug|info|warn|warning|error|critical|dbug|eror|crit)'
                    source: log
                - template:
                    source: level
                    template: '{{ ToUpper .Value }}'
                - labels:
                    level:
          
          # Output clean log line
          - output:
              source: log
